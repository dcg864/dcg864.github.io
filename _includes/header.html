{%- assign current = page.url | replace: '/index.html', '/' -%}
<header class="site-header">
  <div class="container site-header__inner">
    <a class="site-header__brand" href="/" aria-label="{{ site.title }} home">
      <img class="site-header__logo" src="{{ '/images/864.png' | relative_url }}" alt="">
      <span class="site-header__title">{{ site.title | default: site.github.repository_name }}</span>
      <span class="site-header__tagline">DEF CON group of the Upstate</span>
    </a>
    <nav class="site-nav" aria-label="Primary">
      <a href="/" class="site-nav__link"{% if current == '/' %} aria-current="page"{% endif %}>Home</a>
      <a href="/blog/" class="site-nav__link"{% if current == '/blog/' %} aria-current="page"{% endif %}>Blog</a>
      <a href="/about/" class="site-nav__link"{% if current == '/about/' %} aria-current="page"{% endif %}>About</a>
      <a href="/career-notes/" class="site-nav__link"{% if current == '/career-notes/' %} aria-current="page"{% endif %}>Career Notes</a>
      <a href="/resources/" class="site-nav__link"{% if current == '/resources/' %} aria-current="page"{% endif %}>Resources</a>
    </nav>
  </div>
</header>
